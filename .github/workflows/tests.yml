name: Automated tests

on:
  push:
    branches:
      - master
      - beta
  pull_request:
    branches:
      - master
      - beta
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.14"

    steps:
      - name: Check out OSPy
        uses: actions/checkout@v6
        with:
          path: OSPy

      - name: Check out official OSPy plug-ins
        uses: actions/checkout@v6
        with:
          repository: martinpihrt/OSPy-plugins
          ref: master
          path: OSPy-plugins

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmarkgfm requests "qrcode[pil]" paho-mqtt

      - name: Run automated tests
        working-directory: OSPy
        env:
          OSPY_PLUGIN_ROOTS: ${{ github.workspace }}/OSPy-plugins/plugins
        run: python -m unittest discover -s tests -v
