name: Automated tests

on:
  push:
    branches:
      - master
      - beta
  pull_request:
    branches:
      - master
      - beta
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out OSPy
        uses: actions/checkout@v4
        with:
          path: OSPy

      - name: Check out official OSPy plug-ins
        uses: actions/checkout@v4
        with:
          repository: martinpihrt/OSPy-plugins
          ref: master
          path: OSPy-plugins

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "web.py==0.62" cmarkgfm requests "qrcode[pil]" paho-mqtt

      - name: Run automated tests
        working-directory: OSPy
        env:
          OSPY_PLUGIN_ROOTS: ${{ github.workspace }}/OSPy-plugins/plugins
        run: python -m unittest discover -s tests -v
