$def with (docs)

$var title: $_(u'Help')
$var page: help

<script src="/static/scripts/help.js"></script>


<div id="help">
    <div class="title">$_('Help')</div>
    <button id="helpPdfExport" class="helpPdfExport" type="button" title=$:{json.dumps(_('Export help to PDF'), ensure_ascii=False)} aria-label=$:{json.dumps(_('Export help to PDF'), ensure_ascii=False)}>
        <img src="/static/images/pdf.svg" alt="">
    </button>
    <div id="help_container" class="simpleblock">
        <div id="help_menu">
            $for index, doc_entry in enumerate(docs):
                $if len(doc_entry) > 2:
                    <p class="help_link_${doc_entry[0]}"><a href="#${index}">${doc_entry[1]}</a></p>
                $else:
                    <b><p class="help_link_${doc_entry[0]}">${doc_entry[1]}</p></b>
        </div>
        <div id="help_contents">
        </div>
    </div>
</div>
